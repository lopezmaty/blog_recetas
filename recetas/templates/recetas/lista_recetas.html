{% extends 'base.html' %}

{% block title %} Lista de Recetas {% endblock %}

{% block content %}

{% for receta in recetas %}
<p>{{receta.titulo}}</p>
{% for categoria in receta.categorias.all %}
  <p>{{ categoria.nombre }}</p>
{% endfor %}
<p>{{receta.autor}}</p>
{% endfor %}

{% endblock %}
